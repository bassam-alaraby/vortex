{% extends "admin/layout.html" %}

{% block title %}
    Add Variant
{% endblock %}

{% block main %}
    <section class="admin-card">
        <div class="admin-card__head">
            <h1>Add Variant</h1>
            <a class="link-button" href="{{ url_for('admin_products') }}">Back</a>
        </div>

        <form method="post" class="admin-form" enctype="multipart/form-data">
            <label>
                <span>Product</span>
                {% if lock_product and selected_product_id %}
                    <input type="hidden" name="product_id" value="{{ selected_product_id }}">
                    <div class="admin-muted">
                        {% for product in products %}
                            {% if product.id == selected_product_id %}
                                {{ product.name }} (#{{ product.id }})
                            {% endif %}
                        {% endfor %}
                    </div>
                {% else %}
                    <select name="product_id" required>
                        <option value="">Select product</option>
                        {% for product in products %}
                            {% set current_product = form.get('product_id', selected_product_id or 0) | int %}
                            <option value="{{ product.id }}" {% if current_product == product.id %}selected{% endif %}>{{ product.name }} (#{{ product.id }})</option>
                        {% endfor %}
                    </select>
                {% endif %}
            </label>

            <label>
                <span>Name</span>
                <input type="text" name="name" value="{{ form.get('name', '') }}" required>
            </label>

            <label>
                <span>Description</span>
                <textarea name="description" rows="3" required>{{ form.get('description', '') }}</textarea>
            </label>

            <label>
                <span>Color</span>
                <select name="color">
                    <option value="">Select color</option>
                    {% for color in colors %}
                        <option value="{{ color }}" {% if form.get('color') == color %}selected{% endif %}>{{ color }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Or add new color</span>
                <input type="text" name="color_new" value="{{ form.get('color_new', '') }}">
            </label>

            <label>
                <span>Style</span>
                <select name="style">
                    <option value="">Select style</option>
                    {% for style in styles %}
                        <option value="{{ style }}" {% if form.get('style') == style %}selected{% endif %}>{{ style }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Or add new style</span>
                <input type="text" name="style_new" value="{{ form.get('style_new', '') }}">
            </label>

            <label>
                <span>Design (optional)</span>
                <select name="design">
                    <option value="">Select design</option>
                    {% for design in designs %}
                        <option value="{{ design }}" {% if form.get('design') == design %}selected{% endif %}>{{ design }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Or add new design</span>
                <input type="text" name="design_new" value="{{ form.get('design_new', '') }}">
            </label>

            <div class="admin-form-section">
                <div class="admin-form-section__title">Images</div>
                <p class="admin-muted">Upload images and pick the primary one.</p>
                <div class="upload-actions">
                    <input type="file" name="images" id="variant-images" accept="image/png,image/jpeg" multiple required>
                    <button type="button" class="upload-cancel-btn" id="variant-images-clear">Cancel upload</button>
                </div>
                <div class="image-preview" id="variant-image-preview"></div>
            </div>

            <button type="submit">Save</button>
        </form>
    </section>
{% endblock %}
