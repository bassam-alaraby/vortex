{% extends "admin/layout.html" %}

{% block title %}
    Season Settings
{% endblock %}

{% block main %}
    <section class="admin-card admin-card--narrow admin-card--season">
        <div class="admin-card__head">
            <h1>Season Control</h1>
        </div>

        <form method="post" class="admin-form admin-form--season">
            <div class="season-options">
                <label class="radio-option">
                    <input type="radio" name="season" value="summer" {% if current_season == 'summer' %}checked{% endif %}>
                    <span>summer</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="season" value="winter" {% if current_season == 'winter' %}checked{% endif %}>
                    <span>winter</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="season" value="all" {% if current_season == 'all' %}checked{% endif %}>
                    <span>all</span>
                </label>
            </div>

            <button type="submit">Save Season</button>
        </form>
    </section>
{% endblock %}
