<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Admin{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
        <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
    </head>
    <body>
        <header class="admin-header">
            <div class="admin-header__inner">
                <a class="admin-brand">VORTEX DASHBOARD</a>
                {% if session.get('admin') %}
                    <div class="admin-nav-wrap">
                        <button
                            class="admin-hamburger"
                            id="admin-hamburger"
                            type="button"
                            aria-label="Toggle admin navigation"
                            aria-controls="admin-nav"
                            aria-expanded="false"
                        >
                            <i class="ri-menu-line"></i>
                        </button>

                        <nav class="admin-nav" id="admin-nav">
                            <a href="{{ url_for('admin_orders') }}">Orders</a>
                            <a href="{{ url_for('admin_products') }}">Products</a>
                            <a href="{{ url_for('admin_settings') }}">Settings</a>
                            <a href="{{ url_for('admin_logout') }}">Logout</a>
                        </nav>
                    </div>
                {% endif %}
            </div>
        </header>

        <main class="admin-main">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <section class="flash-stack">
                        {% for category, message in messages %}
                            <div class="flash-message flash-message--{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </section>
                {% endif %}
            {% endwith %}

            {% block main %}{% endblock %}
        </main>

        <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    </body>
</html>
