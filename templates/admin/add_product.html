{% extends "admin/layout.html" %}

{% block title %}
    Add Product
{% endblock %}

{% block main %}
    <section class="admin-card admin-card--narrow">
        <div class="admin-card__head">
            <h1>Add Product</h1>
            <a class="link-button" href="{{ url_for('admin_products') }}">Back</a>
        </div>

        <form method="post" class="admin-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>
                <span>Name</span>
                <input type="text" name="name" value="{{ form.get('name', '') }}" required>
            </label>

            <label>
                <span>Price</span>
                <input type="number" step="0.01" name="price" value="{{ form.get('price', '') }}" required>
            </label>

            <label>
                <span>Fit</span>
                <select name="fit">
                    <option value="">Select fit</option>
                    {% for fit in fits %}
                        <option value="{{ fit }}" {% if form.get('fit') == fit %}selected{% endif %}>{{ fit }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Or add new fit</span>
                <input type="text" name="fit_new" value="{{ form.get('fit_new', '') }}">
            </label>

            <label>
                <span>Season</span>
                <select name="season">
                    <option value="">Select season</option>
                    {% for season in seasons %}
                        <option value="{{ season }}" {% if form.get('season') == season %}selected{% endif %}>{{ season }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                <span>Or add new season</span>
                <input type="text" name="season_new" value="{{ form.get('season_new', '') }}">
            </label>

            <button type="submit">Save</button>
        </form>
    </section>
{% endblock %}
