<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">

        <!-- Remix Icons -->
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

        <!-- CSS -->
        <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
        {% block css %}{% endblock %}

        <title>{% block title %}{% endblock %}</title>

    </head>

    <body>
        
        <nav class="navbar">
            <div class="logo">
                <a href="/">
                    <h2>VORTEX</h2>
                </a>
            </div>

            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    Home
                </a>

                <a href="/collection" class="nav-link {% if request.path == '/collection' %}active{% endif %}">
                    Collection
                </a>

                <a href="/about" class="nav-link {% if request.path == '/about' %}active{% endif %}">
                    About us
                </a>
            </div>

            <div class="cart">
                <a href="#">
                    <i class="ri-shopping-bag-line"></i>
                </a>
            </div>
        </nav>

        <!-- main -->
        {% block main %}{% endblock %}

        <footer class="footer">
            © 2026 Vortex. All rights reserved.

            <div class="footer-icons">
                <a href="#" target="_blank" class="footer-btn">
                    <i class="ri-facebook-fill"></i>
                </a>

                <a href="#" target="_blank" class="footer-btn">
                    <i class="ri-instagram-line"></i>
                </a>

                <a href="https://wa.me/201234567890" target="_blank" class="footer-btn">
                    <i class="ri-whatsapp-line"></i>
                </a>
            </div>
        </footer>

    </body>

</html>
