<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="utf-8">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

        <!-- CSS -->
        <link href="static/css/style.css" rel="stylesheet">

        <title>{% block title %}{% endblock %}</title>

        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">Brand <span>Dog</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.path == '/' else '' }}" aria-current="page" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.path == '/products' else '' }}" href="/products">Shop Now</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.path == '/about' else '' }}" href="/about">About us</a>
                        </li>
                    </ul>

                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.path == '/cart' else '' }}" href="/cart">Cart</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link {{ 'active' if request.path == '/buy' else '' }}" href="/buy">Buy Now</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

    </head>

    <body>

        <!-- main -->
        {% block main %}{% endblock %}

        <footer class="footer">
            © 2026 Brand Dog. All rights reserved.

            <div class="footer-icons">
                <a href="#" target="_blank" class="footer-btn">
                    <i class="bi bi-facebook"></i>
                </a>

                <a href="#" target="_blank" class="footer-btn">
                    <i class="bi bi-instagram"></i>
                </a>

                <a href="https://wa.me/201234567890" target="_blank" class="footer-btn">
                    <i class="bi bi-whatsapp"></i>
                </a>
            </div>
        </footer>

    </body>

</html>
